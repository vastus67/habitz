name: habitz
description: Habitz - personal behavioral operating system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
