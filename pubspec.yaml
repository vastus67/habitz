name: habitz
description: Habitz - personal behavioral operating system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  http: ^1.2.2
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  intl: ^0.20.2
  fl_chart: ^0.69.0
  crypto: ^3.0.6
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0
  app_links: ^6.4.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.11.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/workout_splash_1.svg
    - assets/images/workout_splash_2.svg
    - assets/images/workout_splash_3.svg
